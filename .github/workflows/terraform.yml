name: Terraform CI

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"

jobs:
  terraform:
    name: fmt / validate / plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: terraform fmt
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: terraform init
        id: init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -input=false

      - name: terraform validate
        id: validate
        run: terraform validate

      - name: terraform plan
        id: plan
        run: |
          terraform plan \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -no-color \
            -input=false \
            -out=tfplan
        continue-on-error: true

      - name: Publicar resultado no PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        env:
          PLAN: ${{ steps.plan.outputs.stdout }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fmt    = '${{ steps.fmt.outcome }}';
            const init   = '${{ steps.init.outcome }}';
            const validate = '${{ steps.validate.outcome }}';
            const plan   = '${{ steps.plan.outcome }}';

            const icon = (outcome) => outcome === 'success' ? '✅' : '❌';

            const body = `## Terraform CI

            | Etapa | Resultado |
            |-------|-----------|
            | \`fmt\` | ${icon(fmt)} ${fmt} |
            | \`init\` | ${icon(init)} ${init} |
            | \`validate\` | ${icon(validate)} ${validate} |
            | \`plan\` | ${icon(plan)} ${plan} |

            <details><summary>Saída do <code>terraform plan</code></summary>

            \`\`\`hcl
            ${process.env.PLAN}
            \`\`\`

            </details>

            > ⚠️ \`terraform apply\` é executado manualmente (ADR-08).`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Falhar se fmt ou plan falhou
        if: steps.fmt.outcome == 'failure' || steps.plan.outcome == 'failure'
        run: exit 1
